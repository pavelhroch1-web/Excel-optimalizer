name: build-desktop-portable

# Sestaví PORTABLE Windows aplikaci (bez instalace, bez Pythonu na cílovém PC)
# a nahraje ji jako stažitelný ZIP artefakt. Spusť ručně (Actions -> tento
# workflow -> Run workflow) nebo tagem v*. Na cílovém firemním PC pak jen
# rozbalíš ZIP a spustíš FieldForceOptimizer.exe — nic se neinstaluje.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop_client/requirements-desktop.txt pyinstaller requests

      - name: Build portable app (PyInstaller --onedir, self-contained)
        shell: pwsh
        run: |
          # Many backend modules are imported dynamically (inside functions),
          # which PyInstaller's static analysis misses -> they'd be silently
          # left out of the .exe and features (e.g. task_bridge) would break at
          # runtime. Force-include every backend + tools module as a hidden
          # import so the frozen app has the whole backend. Future-proof: new
          # modules are picked up automatically.
          $pyargs = @(
            '--onedir','--windowed','--noconfirm',
            '--name','FieldForceOptimizer',
            '--contents-directory','_internal',
            '--paths','backend','--paths','tools','--paths','desktop_client','--paths','.',
            '--collect-all','uvicorn','--collect-all','webview',
            '--collect-submodules','desktop_client',
            '--hidden-import','PIL._tkinter_finder'
          )
          Get-ChildItem -Path backend,tools -Filter *.py | ForEach-Object {
            if ($_.BaseName -ne '__init__') { $pyargs += '--hidden-import'; $pyargs += $_.BaseName }
          }
          $pyargs += @(
            '--add-data','web;web',
            '--add-data','backend/schema.sql;.',
            '--add-data','workbook/FieldForceOptimizer_V11_scaffold.xlsx;workbook',
            '--add-data','sample_data;sample_data'
          )
          # Bundle the default seed DB if one was produced for this build, so a
          # freshly downloaded app is usable immediately (copied to the runtime
          # dir on first launch, never overwriting a later user import).
          if (Test-Path 'seed/fieldforce.db') {
            $pyargs += @('--add-data','seed/fieldforce.db;seed')
            Write-Host 'Bundling seed/fieldforce.db into the build.'
          } else {
            Write-Host 'No seed/fieldforce.db present - build ships with an empty DB (import to fill).'
          }
          $pyargs += 'desktop_app.py'
          python -m PyInstaller @pyargs

      - name: Zip portable folder
        run: Compress-Archive -Path dist/FieldForceOptimizer/* -DestinationPath FieldForceOptimizer-portable.zip -Force

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: FieldForceOptimizer-portable
          path: FieldForceOptimizer-portable.zip
          retention-days: 30
